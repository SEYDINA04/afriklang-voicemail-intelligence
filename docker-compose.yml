services:
  app:
    build: .
    image: afriklang-voicemail:local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override for container networking / persistence.
      DATABASE_URL: sqlite+aiosqlite:///./data/afriklang.db
    volumes:
      - afriklang_data:/app/data
    restart: unless-stopped

volumes:
  afriklang_data:
